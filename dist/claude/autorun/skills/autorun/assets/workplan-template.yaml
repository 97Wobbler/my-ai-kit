# workplan.yaml — autorun 스킬용 워크플랜 템플릿
#
# 사용법:
#   1. 이 파일을 프로젝트 루트의 workplan.yaml로 복사
#   2. meta 섹션의 placeholder를 스펙 기반으로 채움
#   3. tasks 배열에 실제 태스크 추가
#   4. autorun RUN 모드로 실행
#
# 스키마 상세: ~/.codex/skills/autorun/references/workplan-schema.md

meta:
  created: YYYY-MM-DD
  spec_source: "TODO: 원본 스펙 경로 또는 한 줄 요약"

  as_is: |
    TODO: PLAN 단계에서 파악한 현재 상태를 한 문단으로.
    어떤 파일/모듈/기능이 있고, 어떻게 동작하며, 무엇이 부족한지.

  to_be: |
    TODO: 도달할 최종 상태를 검증 가능한 문장으로.
    "X가 Y를 할 수 있어야 한다" / "Z 테스트가 통과해야 한다" 같은 식.

  human_gate_values:
    null: AI 단독 진행
    approve: 선행 AI 산출물을 기준으로 인간 승인 대기
    execute: 인간 직접 수행 (AI는 준비물만)

  # 프로젝트 고유 원칙/제약 (선택)
  # principles:
  #   - "..."
  #   - "..."

# Optional planning coverage. 큰/high-risk 변경에서만 채우고, 아니면 생략 가능.
# invariants:
#   - id: I01
#     name: "TODO: 지켜야 할 불변식"
#     risk: high
#     surfaces: [S01]
#     verification:
#       - "TODO: 검증 기준"
#
# surfaces:
#   - id: S01
#     type: file
#     name: "TODO: 적용 표면"
#     locations:
#       - path/to/file
#
# criteria_map:
#   - id: C01
#     requirement: "TODO: 요구사항"
#     invariants: [I01]
#     surfaces: [S01]
#     tasks: [T01]
#     verification:
#       - "TODO: 검증 방법"
#
# not_assessed:
#   - id: NA01
#     area: "TODO: 아직 평가하지 못한 영역"
#     risk: medium
#     blocks_ready: false


tasks:

  # ─── 예시 태스크 (지우고 실제 태스크로 교체) ───

  - id: T01
    name: 예시 태스크 — 무언가를 생성
    blocked_by: []
    human_gate: null
	    done: false
	    status: pending
	    category: feat
	    estimated_size: S
	    spec: |
      subagent에 그대로 전달할 상세 명세.
      - 무엇을 어디에 만드는가
      - 어떤 시그니처/타입/포맷
      - 어떤 제약을 지키는가
      - 어떤 입력/출력
      구체적일수록 subagent가 정확히 구현한다.
    output: path/to/expected/output
    lifecycle:
      started_at: null
      verified_at: null
      committed_at: null
      worker_id: null
      commit: null

  - id: T02
    name: 예시 태스크 — T01에 의존
    blocked_by: [T01]
    human_gate: null
	    done: false
	    status: pending
	    category: feat
	    estimated_size: S
	    spec: |
      T01의 산출물을 사용하여 다음 단계 수행.
    output: path/to/another/output
    verify_checks:
      - "L3 내용 검증에서 확인할 첫 번째 기준"
      - "두 번째 기준"
    lifecycle:
      started_at: null
      verified_at: null
      committed_at: null
      worker_id: null
      commit: null

  - id: T03
    name: 예시 태스크 — 선행 산출물 승인 대기
    blocked_by: [T02]
    human_gate: approve
	    done: false
	    status: pending
	    category: review
	    estimated_size: S
	    spec: |
      T02의 산출물을 인간이 검토하고 승인한다.
      승인 전에는 후속 구현/적용 태스크를 진행하지 않는다.
    notes: "승인 판단 산출물은 T02처럼 human_gate: null인 선행 task에서 생성한다."
    lifecycle:
      started_at: null
      verified_at: null
      committed_at: null
      worker_id: null
      commit: null
